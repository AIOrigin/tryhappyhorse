      - heading "The useful category criteria" [level=2] [ref=e83]
      - paragraph [ref=e84]: Broad AI video comparison usually starts with a few practical questions. How easy is it to get started? How much control does the workflow give you? How polished do the outputs look in public examples? How much certainty is there around access, pricing, or source material? Those are better category lenses than a shallow “best overall” claim, especially when public information changes fast.
      - heading "Why this route should stay support-only" [level=2] [ref=e85]
