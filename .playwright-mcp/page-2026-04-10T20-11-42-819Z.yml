    - generic [ref=e73]:
      - paragraph [ref=e74]: "This page exists to answer one specific search question: is HappyHorse actually open source? The careful answer today is that we have not verified public evidence of released source code, released weights, or a public open-source license. That is the answer visitors should see first, not after several paragraphs of repo speculation."
      - heading "What this page means by open source" [level=2] [ref=e75]
      - paragraph [ref=e76]: Open source is broader than finding a repository with the right name. For this route, the useful standard is whether public evidence shows source code, model weights, and licensing terms that people can actually review or use. If those pieces are not publicly verified, the page should not imply that HappyHorse is open source just because people are searching for it that way.
      - heading "What is still unverified" [level=2] [ref=e77]
      - paragraph [ref=e78]: At the time of writing, we have not verified a public official source release, a public model-weight release, or a clear public open-license statement for HappyHorse. That keeps the open-source answer in unknown territory. The page should say that plainly so visitors do not mistake search interest for confirmed availability.
      - heading "Why this page is not the GitHub-status page" [level=2] [ref=e79]
      - paragraph [ref=e80]:
        - text: "The GitHub route answers a narrower question: can an official public repository destination be verified? This route has a different job. It covers the broader open-source status question, which includes code release, weight access, and licensing, even if no official repository can be confirmed. Keeping that split visible helps"
        - link "HappyHorse GitHub" [ref=e81] [cursor=pointer]:
          - /url: /happyhorse-github/
        - text: and this page stay materially different instead of feeling like duplicates.
      - heading "What to do if you need a practical next step" [level=2] [ref=e82]
      - paragraph [ref=e83]:
        - text: If you arrived here hoping to download code, inspect weights, or start building right away, do not assume public release exists. Use
        - link "HappyHorse alternatives" [ref=e84] [cursor=pointer]:
          - /url: /happyhorse-alternatives/
        - text: when you want a practical path forward, or continue to
        - link "Try HappyHorse" [ref=e85] [cursor=pointer]:
          - /url: /try-happyhorse/
        - text: if you want this site’s own non-official action route. Those paths are more useful than overpromising access that has not been verified.
      - heading "Non-official reminder" [level=2] [ref=e86]
      - paragraph [ref=e87]: This website is an independent informational and comparison resource. It is not the official HappyHorse website or service, and this page should not imply source release, weight availability, or public licensing unless that evidence is publicly verified.
