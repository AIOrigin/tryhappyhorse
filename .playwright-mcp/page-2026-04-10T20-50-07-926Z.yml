      - heading "What verified public access information exists" [level=2] [ref=e118]
      - paragraph [ref=e119]: The careful answer is still limited. We can point to public discussion, news coverage, and search interest around HappyHorse, but we have not verified a public official access page, official signup flow, or official public API entry that visitors should rely on as confirmed. That means this page should not create artificial certainty where the public record is still incomplete.
      - heading "What this site provides directly" [level=2] [ref=e120]
      - paragraph [ref=e121]: "This site does provide a direct on-page experience: a browser-based generator flow, a non-official explanation of what the route is for, a visible disclaimer, FAQ coverage, and links to practical next steps. In other words, the page can promise the experience available here without claiming that it is the official HappyHorse access portal."
      - heading "How the frontend-direct API constraint should be explained" [level=2] [ref=e122]
      - paragraph [ref=e123]: The implementation constraint for this site is frontend-direct API usage when a public-safe endpoint is configured. That is a statement about how this page works, not evidence that there is a verified official public API for HappyHorse. The copy should keep those two ideas separate so visitors understand both the product constraint and the public-information uncertainty.
      - heading "How the 2-free-generation rule works" [level=2] [ref=e124]
      - paragraph [ref=e125]: The two free generations are a local UX rule on this site. Only successful generations count toward the limit, failure states should stay visible without consuming the quota, and the gating is browser-local rather than an official account system. Visitors should understand that the rule is here to shape the MVP experience, not to describe an official HappyHorse entitlement model.
