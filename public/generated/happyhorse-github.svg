<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="693" viewBox="0 0 1200 693" fill="none">
  <rect width="1200" height="693" fill="#0c1224"/>
  <rect x="34" y="34" width="1132" height="625" rx="34" fill="url(#bg)" stroke="#3a4c84"/>
  <circle cx="1018" cy="126" r="154" fill="#5ecbff" fill-opacity="0.14"/>
  <circle cx="158" cy="112" r="136" fill="#ff8c61" fill-opacity="0.18"/>
  <rect x="82" y="88" width="190" height="44" rx="22" fill="#1d2a56"/>
  <text x="108" y="117" fill="#ffc47f" font-family="Arial, sans-serif" font-size="22" font-weight="700">GITHUB</text>
  <text x="82" y="220" fill="#f6f7fb" font-family="Georgia, serif" font-size="64" font-weight="700">HappyHorse GitHub Status</text>
  <text x="82" y="286" fill="#c4ccdf" font-family="Arial, sans-serif" font-size="28">Separate repo-search intent from unverified official repository claims.</text>
  <g>
    <rect x="82" y="364" width="472" height="182" rx="28" fill="#162246" stroke="#4862a8"/>
    <text x="112" y="414" fill="#9fddff" font-family="Arial, sans-serif" font-size="21" font-weight="700">Verified signal</text>
    <text x="112" y="455" fill="#f6f7fb" font-family="Arial, sans-serif" font-size="28">The search intent is real</text>
    <text x="112" y="492" fill="#c4ccdf" font-family="Arial, sans-serif" font-size="20">But that does not prove an official public repository exists.</text>
  </g>
  <g>
    <rect x="602" y="364" width="514" height="182" rx="28" fill="#1f315f" stroke="#ff8c61"/>
    <text x="632" y="414" fill="#ffc47f" font-family="Arial, sans-serif" font-size="21" font-weight="700">Safe fallback</text>
    <text x="632" y="455" fill="#f6f7fb" font-family="Arial, sans-serif" font-size="28">Send practical users to a public workflow</text>
    <text x="632" y="492" fill="#c4ccdf" font-family="Arial, sans-serif" font-size="20">Give them Elser, not fake certainty about source access.</text>
  </g>
  <defs>
    <linearGradient id="bg" x1="117" y1="62" x2="1106" y2="638" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121d3a"/>
      <stop offset="1" stop-color="#1d2d59"/>
    </linearGradient>
  </defs>
</svg>
