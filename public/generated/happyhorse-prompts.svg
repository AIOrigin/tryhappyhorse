    <text x="632" y="455" fill="#f6f7fb" font-family="Arial, sans-serif" font-size="28">Use the prompt in Elser’s anime ad flow</text>
    <text x="632" y="492" fill="#c4ccdf" font-family="Arial, sans-serif" font-size="20">Move from template thinking to a public-facing workflow.</text>
  </g>
  <defs>
