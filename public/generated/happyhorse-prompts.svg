  <circle cx="152" cy="122" r="130" fill="#ff8c61" fill-opacity="0.18"/>
  <rect x="82" y="88" width="206" height="44" rx="22" fill="#1d2a56"/>
  <text x="108" y="117" fill="#ffc47f" font-family="Arial, sans-serif" font-size="22" font-weight="700">PROMPTS</text>
  <text x="82" y="220" fill="#f6f7fb" font-family="Georgia, serif" font-size="64" font-weight="700">HappyHorse-Style Prompts</text>
  <text x="82" y="286" fill="#c4ccdf" font-family="Arial, sans-serif" font-size="28">Transferable cinematic prompt structures, not official prompt syntax.</text>
  <g>
    <rect x="82" y="364" width="472" height="182" rx="28" fill="#162246" stroke="#4862a8"/>
    <text x="112" y="414" fill="#9fddff" font-family="Arial, sans-serif" font-size="21" font-weight="700">Prompt formula</text>
    <text x="112" y="455" fill="#f6f7fb" font-family="Arial, sans-serif" font-size="28">Subject · Motion · Camera · Atmosphere</text>
    <text x="112" y="492" fill="#c4ccdf" font-family="Arial, sans-serif" font-size="20">Draft fast, keep the language vivid, then carry it into Elser.</text>
  </g>
  <g>
